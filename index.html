<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcolo Volume Bancali</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #718096;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"], select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a202c;
      transition: border-color 0.2s;
      outline: none;
      background: white;
    }

    input[type="number"]:focus, select:focus {
      border-color: #4299e1;
    }

    .unit {
      font-size: 0.75rem;
      color: #a0aec0;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover {
      background: #3182ce;
    }

    .result {
      margin-top: 28px;
      padding: 24px;
      background: #ebf8ff;
      border-radius: 12px;
      text-align: center;
      display: none;
    }

    .result.visible {
      display: block;
    }

    .result-label {
      font-size: 0.85rem;
      color: #2b6cb0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #2b6cb0;
    }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff5f5;
      border-left: 4px solid #fc8181;
      border-radius: 6px;
      color: #c53030;
      font-size: 0.9rem;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .reset-btn {
      margin-top: 12px;
      background: transparent;
      color: #4299e1;
      border: 2px solid #4299e1;
    }

    .reset-btn:hover {
      background: #ebf8ff;
    }

    /* Storia */
    .history-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .history-header h2 {
      font-size: 1.1rem;
      color: #1a202c;
    }

    .clear-btn {
      width: auto;
      padding: 6px 14px;
      font-size: 0.8rem;
      background: #fff5f5;
      color: #c53030;
      border: 2px solid #fc8181;
      border-radius: 6px;
      margin-top: 0;
    }

    .clear-btn:hover {
      background: #fed7d7;
    }

    .history-empty {
      color: #a0aec0;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px 0;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background: #f7fafc;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #4a5568;
      border-left: 4px solid #4299e1;
    }

    .history-item .hi-result {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 4px;
    }

    .history-item .hi-details {
      font-size: 0.78rem;
      color: #718096;
      margin-top: 4px;
    }

    .history-item .hi-time {
      font-size: 0.72rem;
      color: #a0aec0;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calcolo Volume Bancali</h1>
    <p class="subtitle">Inserisci le dimensioni del bancale per calcolare il volume</p>

    <div class="field">
      <label>P/V</label>
      <select id="pv">
        <option value="300">300</option>
        <option value="250">250</option>
        <option value="200">200</option>
        <option value="167">167</option>
      </select>
    </div>

    <div class="field">
      <label>Lunghezza</label>
      <input type="number" id="lunghezza" placeholder="es. 120" min="0" step="0.01" />
      <div class="unit">in centimetri (cm)</div>
    </div>

    <div class="field">
      <label>Profondità</label>
      <input type="number" id="profondita" placeholder="es. 80" min="0" step="0.01" />
      <div class="unit">in centimetri (cm)</div>
    </div>

    <div class="field">
      <label>Altezza</label>
      <input type="number" id="altezza" placeholder="es. 150" min="0" step="0.01" />
      <div class="unit">in centimetri (cm)</div>
    </div>

    <button onclick="calcola()">Calcola</button>
    <button class="reset-btn" onclick="resetCampi()">Azzera</button>

    <div class="error" id="errore">Inserisci tutti e tre i valori con numeri maggiori di zero.</div>

    <div class="result" id="risultato">
      <div class="result-label">PV</div>
      <div class="result-value" id="pv-value">—</div>
    </div>
  </div>

  <div class="history-container">
    <div class="history-header">
      <h2>Storia dei calcoli</h2>
      <button class="clear-btn" onclick="cancellaStoria()">Cancella tutto</button>
    </div>
    <div id="history-content">
      <div class="history-empty">Nessun calcolo ancora.</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bancali_storia';

    function getStoria() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function salvaStoria(storia) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(storia));
    }

    function renderStoria() {
      const storia = getStoria();
      const contenuto = document.getElementById('history-content');
      if (storia.length === 0) {
        contenuto.innerHTML = '<div class="history-empty">Nessun calcolo ancora.</div>';
        return;
      }
      contenuto.innerHTML = '<div class="history-list">' +
        storia.slice().reverse().map(item => `
          <div class="history-item">
            <div class="hi-result">PV: ${item.pv}</div>
            <div class="hi-details">
              L: ${item.l} cm &nbsp;|&nbsp; P: ${item.p} cm &nbsp;|&nbsp; A: ${item.a} cm &nbsp;|&nbsp; Fattore P/V: ${item.fattore}
            </div>
            <div class="hi-time">${item.data}</div>
          </div>
        `).join('') +
      '</div>';
    }

    function calcola() {
      const l = parseFloat(document.getElementById('lunghezza').value);
      const p = parseFloat(document.getElementById('profondita').value);
      const a = parseFloat(document.getElementById('altezza').value);
      const fattore = parseInt(document.getElementById('pv').value);

      const errore = document.getElementById('errore');
      const risultato = document.getElementById('risultato');

      if (!l || !p || !a || l <= 0 || p <= 0 || a <= 0) {
        errore.classList.add('visible');
        risultato.classList.remove('visible');
        return;
      }

      errore.classList.remove('visible');

      const volumeM3 = (l / 100) * (p / 100) * (a / 100);
      const pvRisultato = (volumeM3 * fattore).toFixed(4);

      document.getElementById('pv-value').textContent = pvRisultato;
      risultato.classList.add('visible');

      const ora = new Date();
      const data = ora.toLocaleDateString('it-IT') + ' ' + ora.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

      const storia = getStoria();
      storia.push({ l, p, a, fattore, pv: pvRisultato, data });
      salvaStoria(storia);
      renderStoria();
    }

    function resetCampi() {
      document.getElementById('lunghezza').value = '';
      document.getElementById('profondita').value = '';
      document.getElementById('altezza').value = '';
      document.getElementById('errore').classList.remove('visible');
      document.getElementById('risultato').classList.remove('visible');
    }

    function cancellaStoria() {
      if (confirm('Sei sicuro di voler cancellare tutta la storia?')) {
        salvaStoria([]);
        renderStoria();
      }
    }

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') calcola();
      });
    });

    renderStoria();
  </script>
</body>
</html>
